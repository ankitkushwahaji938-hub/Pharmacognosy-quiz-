            { q: "Isapgol seeds are adulterated with:", options: ["Plantago purshii", "Plantago lanciolata", "Plantago aristala", "Plantago pysllium"], correct: 1 },
            { q: "Agar is used as:", options: ["Binder", "Disintigrant", "Emulsifying agent", "Preservative"], correct: 2 },
            { q: "Amylum is the synonym for:", options: ["Tragacanth", "Starch", "Inulin", "Locust bean"], correct: 1 },
            { q: "The synonym of Lactose is:", options: ["Milk sugar", "Butter sugar", "Crystalline sugar", "Pure sugar"], correct: 0 },
            { q: "Gambir flurescin test is used for drug:", options: ["Arjuna", "Ashoka", "Pale catechu", "Black catechu"], correct: 2 },
            { q: "Goldbeater skin test is used for identification of:", options: ["Alkaloids", "Glycosides", "Tannins", "Resins"], correct: 2 },
            { q: "Which drugs are used as antitussive:", options: ["Vasaka", "Tulsi", "Dioscorea", "A & B Both"], correct: 3 },
            { q: "All drugs are belong to leguminosae family EXCEPT:", options: ["Guar gum", "Acacia", "Glycyrrhiza", "Garlic"], correct: 3 },
            { q: "All drugs are belonging to family Liliaceae family EXCEPT:", options: ["Linseed oil", "Satavari", "Colchicum", "Withania"], correct: 3 },
            { q: "Following drugs are used as Carminative EXCEPT:", options: ["Asafoetida", "Nutmeg", "Ajowan", "Catechu"], correct: 3 },
            { q: "Given the following drug which is used as antidiabetic:", options: ["Shankpushpi", "Picrorrhiza", "Gymnema", "Ergot"], correct: 2 },
            { q: "Which oil is used as Antileprotic:", options: ["Lemon oil", "Sandal wood oil", "Chaulmoogra oil", "Shark liver oil"], correct: 2 },
            { q: "Phenanthrene nucleus is present in:", options: ["Morphine", "Codeine", "Papaverine", "Thebaine"], correct: 2 },
            { q: "All drugs are obtained from seeds EXCEPT:", options: ["Nutmeg", "Asafoetida", "Nux-vomica", "Guargum"], correct: 1 },
            { q: "All drugs are obtained from leaves EXCEPT:", options: ["Vasaka", "Tulsi", "Gymnema", "Guggal"], correct: 3 },
            { q: "All drugs are obtained from roots EXCEPT:", options: ["Rauwolfia", "Aconite", "Withania", "Caraway"], correct: 3 },
            { q: "All drugs are obtained from fruit EXCEPT:", options: ["Dill", "Fennel", "Clove", "Ajowan"], correct: 2 }
        ];

        let currentQuestion = 0;
        let answers = {};
        let score = 0;

        function loadQuestion() {
            const q = quizData[currentQuestion];
            document.getElementById('questionNumber').textContent = `Question ${currentQuestion + 1}`;
            document.getElementById('questionText').textContent = q.q;
            document.getElementById('questionCounter').textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
            document.getElementById('answerFeedback').classList.remove('show');

            const progressPercent = ((currentQuestion + 1) / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progressPercent + '%';

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            q.options.forEach((option, index) => {
                const div = document.createElement('label');
                div.className = 'option';
                div.innerHTML = `<input type="radio" name="option" value="${index}" ${answers[currentQuestion] === index ? 'checked' : ''}>
                <label>${String.fromCharCode(65 + index)}) ${option}</label>`;
                
                const radio = div.querySelector('input');
                radio.addEventListener('change', () => {
                    answers[currentQuestion] = index;
                    updateScore();
                    showFeedback(index);
                    div.classList.add('selected');
                });

                container.appendChild(div);
            });

            updateButtonStates();
            updateScore();
        }

        function showFeedback(selectedIndex) {
            const q = quizData[currentQuestion];
            const feedback = document.getElementById('answerFeedback');
            const isCorrect = selectedIndex === q.correct;
            
            feedback.classList.remove('correct', 'incorrect');
            feedback.classList.add(isCorrect ? 'correct' : 'incorrect');
            feedback.textContent = isCorrect ? '✓ Correct Answer!' : `✗ Incorrect. The correct answer is ${String.fromCharCode(65 + q.correct)})`;
            feedback.classList.add('show');
        }

        function updateScore() {
            let currentScore = 0;
            for (let i = 0; i <= currentQuestion; i++) {
                if (answers[i] === quizData[i].correct) {
                    currentScore++;
                }
            }
            score = currentScore;
            document.getElementById('scoreDisplay').textContent = `Score: ${score}/${currentQuestion + 1}`;
        }

        function nextQuestion() {
            if (currentQuestion < quizData.length - 1) {
                currentQuestion++;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion();
            }
        }

        function updateButtonStates() {
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            if (currentQuestion === quizData.length - 1) {
                document.getElementById('nextBtn').textContent = 'Submit Quiz';
            } else {
                document.getElementById('nextBtn').textContent = 'Next Question';
            }
        }

        function showResults() {
            let totalScore = 0;
            for (let i = 0; i < quizData.length; i++) {
                if (answers[i] === quizData[i].correct) {
                    totalScore++;
                }
            }

            const percentage = (totalScore / quizData.length) * 100;
            let message = '';
            if (percentage >= 90) {
                message = 'Outstanding! You have excellent knowledge of Pharmacognosy!';
            } else if (percentage >= 75) {
                message = 'Great! You have a strong understanding of Pharmacognosy.';
            } else if (percentage >= 60) {
                message = 'Good! You have a decent grasp of the concepts.';
            } else if (percentage >= 40) {
                message = 'Fair. Review the topics and practice more.';
            } else {
                message = 'Keep studying! Pharmacognosy requires consistent practice.';
            }

            document.getElementById('questionCard').style.display = 'none';
            document.getElementById('resultsSection').classList.add('show');
            document.getElementById('finalScore').textContent = `${totalScore} / ${quizData.length}`;
            document.getElementById('scoreMessage').textContent = `${percentage.toFixed(1)}% - ${message}`;
            document.getElementById('nextBtn').textContent = 'Restart Quiz';
            document.getElementById('nextBtn').onclick = () => location.reload();
        }

        // Initialize
        loadQuestion();
    </script>
</body>
</html>
